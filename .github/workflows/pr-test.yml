name: PR Test

# 在 PR 上跑 Vitest 单元/特征测试卡门。
# 背景：仓库此前只有 type-check 与 build 两道 CI，没有任何自动跑测试的门禁，
# 重构（尤其是 AI 调用链 → 信息块系统的 Chunk 契约）缺少回归保护。
# 这个轻量 job 让特征测试在 PR 阶段就守住行为，配合 plans/ai-provider-refactor。

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies with retry
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Attempting npm ci..."
          npm ci || {
            echo "npm ci failed, trying alternative approaches..."
            rm -rf node_modules package-lock.json
            npm cache clean --force
            npm install --no-package-lock || npm install --legacy-peer-deps
          }

      - name: Run Tests
        run: npm test
